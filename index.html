                        <div className="absolute right-0 w-[72px] h-[144px] bg-gradient-to-l from-amber-300 to-amber-500 border-l-2 border-yellow-300 rounded-r-full origin-left transition-all duration-[1200ms] ease-out shadow-md z-20" style={{ transform: isKusudamaOpen ? "translateX(120px) rotate(45deg) scale(0.7)" : "translateX(0) rotate(0deg) scale(1)", opacity: isKusudamaOpen ? 0.1 : 1 }}><div className="absolute bottom-2 right-2 w-3 h-8 bg-red-500 rounded-full origin-top transform -rotate-12"></div></div>
                        <div className="absolute top-4 w-44 bg-gradient-to-b from-red-500 to-red-600 text-white font-black text-center shadow-lg border-2 border-yellow-300 rounded-b-xl flex flex-col justify-between py-3 z-30 transition-all duration-1000 ease-out overflow-hidden" style={{ opacity: isKusudamaOpen ? 1 : 0, height: isKusudamaOpen ? "140px" : "0", transform: isKusudamaOpen ? "translateY(10px) scale(1)" : "translateY(-40px) scale(0.5)", boxShadow: "0 10px 15px -3px rgba(220, 38, 38, 0.3)" }}>
                          <p className="text-xs tracking-widest text-yellow-200">🎊 <ruby>祝<rt>しゅく</rt></ruby> 🎊</p><h4 className="text-lg tracking-wider text-white font-extrabold my-1"><ruby>新記録達成<rt>しんきろくたっせい</rt></ruby>！</h4><p className="text-[10px] text-yellow-100">おめでとうございます！</p>
                        </div>
                      </div>
                    </div>
                  )}

                  {(newRecords.score || newRecords.correct || newRecords.combo || newRecords.time) && (
                    <div className="bg-amber-50 border-2 border-amber-300 rounded-3xl p-6 text-center flex flex-col items-center gap-2 animate-pulse my-2">
                      <span className="text-3xl">🎉</span><h4 className="text-2xl font-black text-amber-600 flex gap-1">🏆 <ruby>新記録<rt>しんきろく</rt></ruby>！</h4>
                      <div className="flex flex-col gap-2 mt-2 w-full max-w-sm">
                        {newRecords.score && <div className="flex justify-between items-center bg-white px-4 py-2 rounded-xl border border-amber-100"><span className="text-sm font-bold text-slate-500">✨ <ruby>獲得<rt>かくとく</rt></ruby>スコア<ruby>更新<rt>こうしん</rt></ruby>！</span><span className="text-xl font-black text-rose-500">{score} ポイント</span></div>}
                        {newRecords.correct && <div className="flex justify-between items-center bg-white px-4 py-2 rounded-xl border border-amber-100"><span className="text-sm font-bold text-slate-500">✨ <ruby>正解数更新<rt>せいかいすうこうしん</rt></ruby>！</span><span className="text-xl font-black text-emerald-600">{correctAnswers} / {maxQuestions} <ruby>問<rt>もん</rt></ruby></span></div>}
                        {newRecords.combo && <div className="flex justify-between items-center bg-white px-4 py-2 rounded-xl border border-amber-100"><span className="text-sm font-bold text-slate-500">✨ <ruby>連続正解数更新<rt>れんぞくせいかいすうこうしん</rt></ruby>！</span><span className="text-xl font-black text-amber-500">{maxCombo} 連続</span></div>}
                        {newRecords.time && <div className="flex justify-between items-center bg-white px-4 py-2 rounded-xl border border-amber-100"><span className="text-sm font-bold text-slate-500">✨ <ruby>全問正解<rt>ぜんもんせいかい</rt></ruby>タイム<ruby>更新<rt>こうしん</rt></ruby>！</span><span className="text-xl font-black text-blue-500">{(() => { const sec = elapsedTime / 1000; return sec <= 10 ? `${sec.toFixed(1)}秒` : `${Math.round(sec)}秒`; })()}</span></div>}
                      </div>
                    </div>
                  )}

                  <div className="bg-slate-50 rounded-2xl p-5 border border-slate-200 text-center">
                    <p className="text-xs text-slate-400 font-bold uppercase tracking-wider"><ruby>称号<rt>しょうごう</rt></ruby></p>
                    <h4 className={`text-2xl sm:text-3xl font-black mt-2 ${getRankEvaluator().color}`}>{getRankEvaluator().title}</h4>
                    <p className="text-sm text-slate-600 mt-2.5 font-medium leading-relaxed">{getRankEvaluator().desc}</p>
                  </div>

                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center"><p className="text-xs text-slate-400 font-bold uppercase"><ruby>獲得<rt>かくとく</rt></ruby>スコア</p><span className="text-3xl font-black text-rose-500">{score} ポイント</span></div>
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center"><p className="text-xs text-slate-400 font-bold uppercase"><ruby>正解数<rt>せいかいすう</rt></ruby> / <ruby>出題数<rt>しゅつだいすう</rt></ruby></p><span className="text-3xl font-black text-emerald-600">{correctAnswers} / {maxQuestions}問</span></div>
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center"><p className="text-xs text-slate-400 font-bold uppercase"><ruby>連続正解数<rt>れんぞくせいかいすう</rt></ruby></p><span className="text-3xl font-black text-amber-500">{maxCombo} 連続</span></div>
                    {correctAnswers === maxQuestions ? (
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center"><p className="text-xs text-slate-400 font-bold uppercase"><ruby>全問正解<rt>ぜんもんせいかい</rt></ruby>タイム</p><span className="text-3xl font-black text-blue-500">{(() => { const sec = elapsedTime / 1000; return sec <= 10 ? `${sec.toFixed(1)}秒` : `${Math.round(sec)}秒`; })()}</span></div>
                    ) : (
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center flex flex-col justify-center bg-slate-100/50"><p className="text-xs text-slate-400 font-bold uppercase"><ruby>全問正解<rt>ぜんもんせいかい</rt></ruby>タイム</p><span className="text-sm font-bold text-slate-400 mt-2">（<ruby>全問正解時<rt>ぜんもんせいかいじ</rt></ruby>のみ）</span></div>
                    )}
                  </div>

                  <div className="flex flex-col gap-2 mt-2">
                    <button onClick={() => startQuiz(quizDifficulty, selectedRegionKey, maxQuestions, quizQueue.length ? quizQueue : null)} className="w-full bg-rose-500 hover:bg-rose-600 text-white font-extrabold py-4 px-6 rounded-2xl transition-all shadow-md text-sm sm:text-base text-center">🔄 <ruby>同<rt>おな</rt></ruby>じ<ruby>条件<rt>じょうけん</rt></ruby>でもう<ruby>一度遊<rt>いちどあそ</rt></ruby>ぶ</button>
                    <button onClick={() => { setQuizFinished(false); setSelectedRegionKey(null); }} className="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-extrabold py-4 px-6 rounded-2xl transition-all text-sm sm:text-base text-center border border-slate-200">🏠 ホームに<ruby>戻<rt>もど</rt></ruby>る</button>
                  </div>
                </div>
              )}

            </aside>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
